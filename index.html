        // --- WEB AUDIO API (SOUND EFFECTS) ---
        let audioCtx = null;
        const playSfx = (type) => {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return; 

                if (!audioCtx) {
                    audioCtx = new AudioContext();
                }
                if (audioCtx.state === 'suspended') audioCtx.resume();
                
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                if (type === 'correct') {
                    oscillator.type = 'sine';
                    oscillator.frequency.setValueAtTime(523.25, audioCtx.currentTime); 
                    oscillator.frequency.exponentialRampToValueAtTime(1046.50, audioCtx.currentTime + 0.1); 
                    gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                    oscillator.start(audioCtx.currentTime);
                    oscillator.stop(audioCtx.currentTime + 0.3);
                } else if (type === 'incorrect') {
                    oscillator.type = 'sawtooth';
                    oscillator.frequency.setValueAtTime(150, audioCtx.currentTime); 
                    oscillator.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.2); 
                    gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                    oscillator.start(audioCtx.currentTime);
                    oscillator.stop(audioCtx.currentTime + 0.2);
                } else if (type === 'click') {
                    oscillator.type = 'sine';
                    oscillator.frequency.setValueAtTime(400, audioCtx.currentTime); 
                    oscillator.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.05); 
                    gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
                    oscillator.start(audioCtx.currentTime);
                    oscillator.stop(audioCtx.currentTime + 0.05);
                }
            } catch (err) {
                console.warn("Efek suara tidak didukung.", err);
            }
        };

        // --- LEVEL 1 (Drag & Drop Klasifikasi Data) ---
        function Level1Sumatera({ onComplete, onCorrect }) {
            const data = LEVEL_DATA[1];
            const shuffledItems = useMemo(() => shuffleArray(data.items), [data.items]);
            
            const [droppedItems, setDroppedItems] = useState({}); 
            const [completed, setCompleted] = useState(false);
            const [dragOverTarget, setDragOverTarget] = useState(null);
            const [selectedItem, setSelectedItem] = useState(null);
            const [feedbackMsg, setFeedbackMsg] = useState("");

            const handleDragStart = (e, item) => { e.dataTransfer.setData("item", JSON.stringify(item)); };
            const handleDragOver = (e, targetId) => { e.preventDefault(); setDragOverTarget(targetId); };
            const handleDragLeave = (e) => { e.preventDefault(); setDragOverTarget(null); }
            const handleDrop = (e, target) => {
                e.preventDefault(); 
                setDragOverTarget(null);
                const itemData = e.dataTransfer.getData("item");
                if (itemData) {
                    const item = JSON.parse(itemData);
                    setDroppedItems(prev => ({ ...prev, [item.id]: target.id }));
                    setFeedbackMsg("");
                }
            };

            const handleRemoveItem = (itemId) => {
                setDroppedItems(prev => { const newItems = { ...prev }; delete newItems[itemId]; return newItems; });
                setFeedbackMsg("");
            };

            const handleItemClick = (item) => { setSelectedItem(selectedItem?.id === item.id ? null : item); };
            const handleTargetClick = (target) => { 
                if (selectedItem) {
                    setDroppedItems(prev => ({ ...prev, [selectedItem.id]: target.id }));
                    setSelectedItem(null);
                    setFeedbackMsg("");
                } 
            };

            const handleCheckAnswer = () => {
                let isAllCorrect = true;
                data.items.forEach(item => { if (droppedItems[item.id] !== item.matchId) isAllCorrect = false; });

                if (isAllCorrect) {
                    playSfx('correct');
                    for(let i=0; i<6; i++) { if (onCorrect) onCorrect(); }
                    setCompleted(true);
                } else {
                    playSfx('incorrect');
                    setFeedbackMsg("Oops! Ada bentuk penyajian yang salah kotak. Coba teliti lagi!");
                }
            };

            const allItemsDropped = Object.keys(droppedItems).length === data.items.length;

            return (
                <div className="flex flex-col h-full w-full max-w-7xl mx-auto flex-1 min-h-0 bg-white/95 backdrop-blur-md rounded-3xl shadow-xl p-4 md:p-6 border-4 border-lime-300">
                  {!completed ? (
                    <div className="flex flex-col flex-1 min-h-0 animate-fade-in">
                        <div className="bg-lime-100 p-3 xl:p-4 rounded-xl border-l-4 border-lime-500 text-center text-sm md:text-base xl:text-xl font-bold text-lime-900 mb-4 shadow-sm flex-shrink-0">
                            💡 {data.instruction}
                        </div>
                        
                        <div className="flex flex-col md:flex-row gap-4 xl:gap-8 flex-1 min-h-0">
                          <div className="flex-1 md:w-1/2 flex flex-col min-h-0 overflow-y-auto custom-scrollbar pr-2">
                            <div className="grid grid-cols-3 md:grid-cols-2 lg:grid-cols-3 gap-3 p-3 xl:p-4 bg-white/90 rounded-2xl border-2 border-dashed border-gray-300 min-h-[200px]">
                              {shuffledItems.map(item => (
                                !droppedItems[item.id] && (
                                  <div key={item.id} draggable onDragStart={(e) => handleDragStart(e, item)} onClick={() => handleItemClick(item)}
                                    className={`p-3 xl:p-4 rounded-xl border-2 text-center aspect-square flex flex-col items-center justify-center cursor-grab active:cursor-grabbing select-none bg-white shadow-sm hover:shadow-md ${selectedItem?.id === item.id ? 'border-lime-500 bg-lime-50 scale-105' : 'border-gray-200'}`}
                                  >
                                    <div className="h-1/2 md:h-2/3 w-full flex items-center justify-center mb-1">
                                        <span className="text-3xl xl:text-5xl">{item.icon}</span>
                                    </div>
                                    <span className="font-bold text-[10px] md:text-xs xl:text-sm text-gray-700 pointer-events-none leading-tight">{item.text}</span>
                                  </div>
                                )
                              ))}
                              {allItemsDropped && <p className="col-span-3 md:col-span-2 lg:col-span-3 text-center text-gray-400 font-bold text-base xl:text-xl mt-6">Semua berkas telah diklasifikasikan.</p>}
                            </div>
                          </div>
                          
                          <div className="flex-1 md:w-1/2 flex flex-col min-h-0 overflow-y-auto custom-scrollbar pr-2">
                            <div className="grid grid-cols-1 gap-4">
                              {data.targets.map(target => (
                                <div key={target.id} onDragOver={(e) => handleDragOver(e, target.id)} onDragLeave={handleDragLeave} onDrop={(e) => handleDrop(e, target)} onClick={() => handleTargetClick(target)}
                                  className={`w-full p-4 xl:p-6 rounded-xl border-4 flex flex-col justify-start items-start transition-all min-h-[140px] xl:min-h-[180px] cursor-pointer ${dragOverTarget === target.id ? 'bg-lime-100 border-lime-400 scale-[1.02]' : 'bg-white border-dashed border-gray-300'}`}
                                >
                                  <span className="font-black text-gray-800 text-sm md:text-lg xl:text-2xl mb-3 border-b-2 pb-2 w-full">{target.label}</span>
                                  <div className="flex gap-2 flex-wrap justify-start w-full">
                                    {data.items.filter(i => droppedItems[i.id] === target.id).map(i => (
                                      <div key={i.id} title={`${i.text} (Klik untuk mengembalikan)`} onClick={(e) => { e.stopPropagation(); handleRemoveItem(i.id); }} className="w-auto px-3 py-2 bg-blue-100 text-blue-900 font-bold rounded-lg border border-blue-300 shadow-sm animate-pop-in cursor-pointer hover:bg-red-50 hover:border-red-300 hover:text-red-600 transition-colors flex items-center gap-2 text-xs md:text-sm">
                                         <span>{i.icon}</span> {i.text} ✕
                                      </div>
                                    ))}
                                  </div>
                                </div>
                              ))}
                            </div>
                          </div>
                        </div>

                        {allItemsDropped && (
                            <div className="mt-4 flex flex-col items-center flex-shrink-0 animate-fade-in">
                                {feedbackMsg && <p className="text-red-600 font-bold text-sm md:text-base xl:text-xl mb-3 bg-red-100 px-5 py-3 rounded-xl border border-red-200 text-center">{feedbackMsg}</p>}

                            </div>

                    <div className="bg-white/95 p-6 md:p-10 xl:p-14 rounded-3xl shadow-xl text-center space-y-5 border border-lime-200 max-w-3xl mx-auto animate-fade-in my-auto">

                      <div>
                          <h3 className="text-xl md:text-3xl xl:text-4xl font-black text-lime-800 uppercase tracking-wider mb-2">Hebat!</h3>

                                       >
                                           <option value="" disabled>-- Klik di sini untuk memilih alasan --</option>

                                       <div className="absolute right-4 xl:right-6 top-1/2 transform -translate-y-1/2 pointer-events-none">

        // --- LEVEL 4: SULAWESI (Paragraf Rumpang) ---
        function Level4Sulawesi({ onComplete, onCorrect }) {
            const data = LEVEL_DATA[4];
            const [droppedWords, setDroppedWords] = useState({}); 
            const [availableWords, setAvailableWords] = useState([]);
            const [selectedWord, setSelectedWord] = useState(null);
            const [dragOverBlank, setDragOverBlank] = useState(null);
            const [feedbackMsg, setFeedbackMsg] = useState("");
            const [completed, setCompleted] = useState(false);
            const [imageError, setImageError] = useState(false);

            useEffect(() => {
                setAvailableWords(shuffleArray(data.words));
                setDroppedWords({});
            }, [data.words]);

            const handleDragStart = (e, word, sourceBlankId = null) => {
                e.dataTransfer.setData("word", JSON.stringify(word));
                e.dataTransfer.setData("source", sourceBlankId || "pool");
            };

            const handleDropOnBlank = (e, blankId) => {
                e.preventDefault();
                setDragOverBlank(null);
                const wordData = e.dataTransfer.getData("word");
                const source = e.dataTransfer.getData("source");
                
                if (wordData) {
                    const word = JSON.parse(wordData);
                    setAvailableWords(prev => prev.filter(w => w.id !== word.id));
                    setDroppedWords(prev => {
                        const newDropped = { ...prev };
                        if (source !== "pool" && source !== blankId) delete newDropped[source];
                        if (newDropped[blankId]) setAvailableWords(avail => [...avail, newDropped[blankId]]);
                        newDropped[blankId] = word;
                        return newDropped;
                    });
                    setFeedbackMsg("");
                    setSelectedWord(null);
                }
            };

            const handleDropOnPool = (e) => {
                e.preventDefault();
                const wordData = e.dataTransfer.getData("word");
                const source = e.dataTransfer.getData("source");
                
                if (wordData && source !== "pool") {
                    const word = JSON.parse(wordData);
                    setDroppedWords(prev => {
                        const newDropped = { ...prev };
                        delete newDropped[source];
                        return newDropped;
                    });
                    setAvailableWords(prev => {
                        if (!prev.find(w => w.id === word.id)) return [...prev, word];
                        return prev;
                    });
                    setFeedbackMsg("");
                }
            };
            
            const handleWordClick = (word) => { setSelectedWord(selectedWord?.id === word.id ? null : word); };

            const handleBlankClick = (blankId) => {
                if (selectedWord) {
                    if (droppedWords[blankId]) setAvailableWords(prev => [...prev, droppedWords[blankId]]);
                    setDroppedWords(prev => ({...prev, [blankId]: selectedWord}));
                    setAvailableWords(prev => prev.filter(w => w.id !== selectedWord.id));
                    setSelectedWord(null);
                    setFeedbackMsg("");
                } else if (droppedWords[blankId]) {
                    setAvailableWords(prev => [...prev, droppedWords[blankId]]);
                    setDroppedWords(prev => {
                        const newDropped = {...prev};
                        delete newDropped[blankId];
                        return newDropped;
                    });
                    setFeedbackMsg("");
                }
            };

            const handleCheckAnswer = () => {
                let isAllCorrect = true;
                let totalBlanks = 0;
                let filledBlanks = 0;

                data.paragraphs.forEach(p => {
                    p.sentences.forEach(s => {
                        totalBlanks++;
                        const dropped = droppedWords[s.blankId];
                        if (dropped) {
                            filledBlanks++;
                            if (dropped.text !== s.correct) isAllCorrect = false;
                        } else {
                            isAllCorrect = false;
                        }
                    });
                });

                if (filledBlanks < totalBlanks) {
                    setFeedbackMsg("Isi semua bagian rumpang laporan terlebih dahulu ya!");
                    return;
                }

                if (isAllCorrect) {
                    playSfx('correct');
                    for(let i=0; i<5; i++) { if (onCorrect) onCorrect(); }
                    setCompleted(true);
                } else {
                    playSfx('incorrect');
                    setFeedbackMsg("Masih ada kata atau angka yang keliru. Klik kotak jawaban untuk mengembalikannya, lalu coba lagi!");
                }
            };

            return (
                <div className="flex flex-col h-full w-full max-w-5xl mx-auto flex-1 min-h-0 bg-white/95 backdrop-blur-md rounded-3xl shadow-xl p-3 md:p-6 border-4 border-rose-300">
                   {!completed ? (
                       <div className="flex flex-col flex-1 min-h-0 overflow-hidden bg-white rounded-2xl border border-gray-200">
                           
                           <div className="w-full p-4 md:p-6 xl:p-8 flex flex-col flex-1 min-h-0">
                               <div className="bg-rose-50 border-l-4 border-rose-500 p-4 rounded-r-xl mb-4 text-rose-900 font-bold text-sm md:text-base whitespace-pre-wrap">
                                   {data.stimulusText}
                               </div>

                               {/* Area Gambar / Diagram Batang Misi 4 */}
                               <div className="mb-6 flex justify-center w-full">
                                   {!imageError ? (
                                       <img 
                                            src="https://gemini.google.com/share/25900292366a" 
                                            alt="Diagram Batang Ekstrakurikuler" 
                                            className="max-w-full h-auto rounded-xl shadow-md border-2 border-rose-200"
                                            onError={() => setImageError(true)}
                                       />
                                   ) : (
                                       <div className="w-full max-w-md bg-white p-4 rounded-2xl border-2 border-rose-200 shadow-sm flex flex-col animate-fade-in">
                                            <h5 className="text-center font-black text-rose-800 mb-4 text-sm md:text-base">Diagram Ekstrakurikuler Kelas 5</h5>
                                            <div className="flex items-end justify-around h-40 gap-2 border-b-2 border-l-2 border-gray-400 p-2 pb-0 relative">
                                                {/* Garis bantu horizontal */}
                                                <div className="absolute w-full h-[1px] bg-gray-200 bottom-[20%] z-0"></div>
                                                <div className="absolute w-full h-[1px] bg-gray-200 bottom-[40%] z-0"></div>
                                                <div className="absolute w-full h-[1px] bg-gray-200 bottom-[60%] z-0"></div>
                                                <div className="absolute w-full h-[1px] bg-gray-200 bottom-[80%] z-0"></div>
                                                <div className="absolute w-full h-[1px] bg-gray-200 bottom-[100%] z-0"></div>
                                                
                                                {/* Batang Diagram */}
                                                <div className="flex flex-col items-center w-1/4 h-full justify-end z-10 group cursor-pointer hover:-translate-y-1 transition-transform">
                                                    <span className="text-xs font-black text-blue-700 mb-1 bg-white px-1 rounded">25</span>
                                                    <div className="w-3/4 bg-blue-500 rounded-t-md shadow-sm border-2 border-blue-600 group-hover:bg-blue-400" style={{height: '100%'}}></div>
                                                </div>
                                                <div className="flex flex-col items-center w-1/4 h-full justify-end z-10 group cursor-pointer hover:-translate-y-1 transition-transform">
                                                    <span className="text-xs font-black text-green-700 mb-1 bg-white px-1 rounded">15</span>
                                                    <div className="w-3/4 bg-green-500 rounded-t-md shadow-sm border-2 border-green-600 group-hover:bg-green-400" style={{height: '60%'}}></div>
                                                </div>
                                                <div className="flex flex-col items-center w-1/4 h-full justify-end z-10 group cursor-pointer hover:-translate-y-1 transition-transform">
                                                    <span className="text-xs font-black text-yellow-700 mb-1 bg-white px-1 rounded">10</span>
                                                    <div className="w-3/4 bg-yellow-400 rounded-t-md shadow-sm border-2 border-yellow-500 group-hover:bg-yellow-300" style={{height: '40%'}}></div>
                                                </div>
                                                <div className="flex flex-col items-center w-1/4 h-full justify-end z-10 group cursor-pointer hover:-translate-y-1 transition-transform">
                                                    <span className="text-xs font-black text-red-700 mb-1 bg-white px-1 rounded">5</span>
                                                    <div className="w-3/4 bg-red-500 rounded-t-md shadow-sm border-2 border-red-600 group-hover:bg-red-400" style={{height: '20%'}}></div>
                                                </div>
                                            </div>
                                            <div className="flex justify-around mt-3 text-[10px] md:text-xs font-bold text-gray-700 text-center uppercase tracking-wider">
                                                <div className="w-1/4 text-blue-900">Pramuka</div>
                                                <div className="w-1/4 text-green-900">Futsal</div>
                                                <div className="w-1/4 text-yellow-900">Tari</div>
                                                <div className="w-1/4 text-red-900">Melukis</div>
                                            </div>
                                       </div>
                                   )}
                               </div>

                               <div className="bg-rose-100 p-4 md:p-6 rounded-xl mb-4 text-center border-2 border-dashed border-rose-300 flex-shrink-0"
                                    onDragOver={(e) => { e.preventDefault(); }}
                                    onDrop={handleDropOnPool}
                               >
                                   <p className="text-sm md:text-base xl:text-xl font-bold text-rose-800 mb-3">PILIHAN KATA/ANGKA (Tarik atau Klik):</p>
                                   <div className="flex flex-wrap gap-2 justify-center">
                                       {availableWords.map(word => (
                                            <div 
                                                key={word.id} draggable onDragStart={(e) => handleDragStart(e, word)} onClick={() => handleWordClick(word)}
                                                className={`px-4 py-2 rounded-lg border-2 font-bold text-sm md:text-base cursor-grab active:cursor-grabbing shadow-sm transition-all select-none ${selectedWord?.id === word.id ? 'bg-rose-500 border-rose-600 text-white scale-105' : 'bg-white text-gray-700 border-rose-300 hover:border-rose-400 hover:bg-rose-50'}`}
                                            >
                                                {word.text}
                                            </div>
                                       ))}
                                       {availableWords.length === 0 && <span className="text-sm text-gray-500 italic mt-2">Semua kata sudah disisipkan.</span>}
                                   </div>
                               </div>

                               <div className="flex-grow overflow-y-auto pr-2 custom-scrollbar space-y-4">
                                    {data.paragraphs.map(p => (
                                        <div key={p.id} className="p-4 xl:p-6 rounded-2xl border border-gray-200 bg-gray-50 shadow-sm">
                                            {p.title && <h4 className="text-lg xl:text-xl font-black text-rose-900 mb-3 xl:mb-5 border-b pb-2">{p.title}</h4>}
                                            <p className="text-base md:text-lg xl:text-2xl leading-[2.5] xl:leading-[2.8] text-gray-800 font-medium">
                                                {p.sentences.map(s => (
                                                    <span key={s.id}>
                                                        {s.before}
                                                        <span 
                                                            onClick={() => handleBlankClick(s.blankId)} onDragOver={(e) => { e.preventDefault(); setDragOverBlank(s.blankId); }} onDragLeave={() => setDragOverBlank(null)} onDrop={(e) => handleDropOnBlank(e, s.blankId)}
                                                            className={`inline-block mx-1 min-w-[120px] h-8 md:h-10 text-center align-middle rounded-lg border-b-4 cursor-pointer transition-all ${
                                                              dragOverBlank === s.blankId ? 'bg-blue-100 border-blue-400' : 'bg-white border-gray-300 border-dashed'
                                                            } ${droppedWords[s.blankId] ? 'bg-rose-500 border-rose-600 text-white font-bold shadow-inner' : ''}`}
                                                        >
                                                            {droppedWords[s.blankId] ? droppedWords[s.blankId].text : ''}
                                                        </span>
                                                        {s.after}
                                                    </span>
                                                ))}
                                            </p>
                                        </div>
                                    ))}
                               </div>

                               <div className="mt-5 flex flex-col items-center flex-shrink-0">
                                   {feedbackMsg && <p className="text-red-600 font-bold text-sm md:text-base xl:text-xl mb-3 bg-red-100 px-5 py-3 rounded-xl border border-red-200 text-center w-full">{feedbackMsg}</p>}
                                   <button onClick={handleCheckAnswer} className="bg-gradient-to-b from-rose-500 to-rose-600 hover:from-rose-600 hover:to-rose-700 text-white font-black py-3 px-10 xl:py-4 xl:px-14 rounded-2xl shadow-[0_6px_0_#9f1239] active:shadow-none active:translate-y-2 transition-all text-base md:text-lg xl:text-2xl flex items-center justify-center gap-3 w-full md:w-auto">
                                       <Icons.CheckCircle className="w-6 h-6" /> Periksa Laporan Data
                                   </button>
                               </div>
                           </div>
                       </div>
                   ) : (
                       <div className="bg-white/95 p-8 md:p-12 xl:p-16 rounded-3xl shadow-xl text-center space-y-6 border border-rose-200 max-w-4xl mx-auto animate-fade-in my-auto">
                         <div className="w-20 h-20 xl:w-28 xl:h-28 bg-rose-100 rounded-full flex items-center justify-center mx-auto text-4xl xl:text-6xl shadow-inner border-4 border-rose-300">📊</div>
                         <div>
                             <h3 className="text-2xl md:text-4xl xl:text-5xl font-black text-rose-900 uppercase tracking-wider mb-4">Laporan Akurat!</h3>
                             <p className="text-lg md:text-xl xl:text-3xl font-bold text-gray-700 leading-relaxed">Kamu berhasil membaca diagram batang dan menyajikannya dalam bentuk laporan paragraf.</p>
                         </div>
                         <button onClick={onComplete} className="bg-gradient-to-b from-rose-500 to-rose-600 hover:from-rose-600 hover:to-rose-700 text-white font-black w-full py-5 xl:py-6 text-xl xl:text-3xl rounded-2xl shadow-[0_6px_0_#9f1239] active:shadow-none active:translate-y-2 transition-all mt-4">Lanjut Misi Terakhir 🚀</button>
                       </div>
                   )}
                </div>
            );
        }

        // --- LEVEL 5: PROYEK (Markas Utama) ---
        function Level5Papua({ onComplete, saveRef, saveData }) {
            const data = LEVEL_DATA[5];
            const [counts, setCounts] = useState({ bakso: "", soto: "", mie: "", kuning: "", pecel: "" });
            const [analysis, setAnalysis] = useState({ q1: "", q2: "", q3: "" });
            const [format, setFormat] = useState("");
            const [plan, setPlan] = useState("");
            const [reflection, setReflection] = useState("");
            const [step, setStep] = useState('project');

            const handleCount = (key, val) => {
                if (val === "" || /^\d+$/.test(val)) {
                    setCounts(prev => ({ ...prev, [key]: val }));
                }
            };

            const handleSubmitProject = () => { 
                const bakso = parseInt(counts.bakso)||0;
                const soto = parseInt(counts.soto)||0;
                const mie = parseInt(counts.mie)||0;
                const kuning = parseInt(counts.kuning)||0;
                const pecel = parseInt(counts.pecel)||0;
                const total = bakso + soto + mie + kuning + pecel;
                
                if (total !== 20) {
                    alert(`Total responden harus tepat 20 orang Detektif! Saat ini total datamu: ${total} orang.`);
                    return;
                }

                // Logika Validasi Analisis Data Otomatis berdasarkan angka yang diisi siswa
                const dict = { "Bakso": bakso, "Soto": soto, "Mie Goreng": mie, "Nasi Kuning": kuning, "Nasi Pecel": pecel };
                const values = Object.values(dict);
                const maxVal = Math.max(...values);
                const minVal = Math.min(...values);

                const maxFoods = Object.keys(dict).filter(k => dict[k] === maxVal);
                const minFoods = Object.keys(dict).filter(k => dict[k] === minVal);
                const diff = maxVal - minVal;

                if (!analysis.q1 || !analysis.q2 || analysis.q3 === "") {
                    alert("Jawab dulu ke-3 pertanyaan analisis hasil surveinya ya, Detektif!");
                    return;
                }
                if (!maxFoods.includes(analysis.q1)) {
                    alert("Coba periksa lagi jawabanmu untuk makanan yang paling BANYAK disukai. Pastikan cocok dengan tabel datamu ya!");
                    return;
                }
                if (!minFoods.includes(analysis.q2)) {
                    alert("Coba periksa lagi jawabanmu untuk makanan yang paling SEDIKIT disukai. Pastikan cocok dengan tabel datamu ya!");
                    return;
                }
                if (parseInt(analysis.q3) !== diff) {
                    alert("Hitungan selisihmu sepertinya keliru. Ingat: Angka pemilih Terbesar dikurangi angka pemilih Terkecil dari tabelmu.");
                    return;
                }

                if (!format || !plan) {
                    alert("Wah, format penyajian dan alasan belum diisi. Lengkapi dulu ya!");
                    return;
                }

                playSfx('correct');
                saveData('final_project', {
                    'Data Survei': `Bakso:${counts.bakso}, Soto:${counts.soto}, Mie:${counts.mie}, N.Kuning:${counts.kuning}, N.Pecel:${counts.pecel}`, 
                    'Penyajian': format, 
                    'Alasan': plan
                }); 
                setStep('reflection');
            };
            
            const handleFinish = () => {
                saveRef(reflection); 
                onComplete();
            };

            if (step === 'reflection') {
                return (
                    <div className="flex flex-col h-full w-full justify-center">
                        <ReflectionSection question={data.reflection} value={reflection} onChange={setReflection} onNext={handleFinish} />
                    </div>
                );
            }

            const currentTotal = (parseInt(counts.bakso)||0) + (parseInt(counts.soto)||0) + (parseInt(counts.mie)||0) + (parseInt(counts.kuning)||0) + (parseInt(counts.pecel)||0);

            return (
                <div className="flex flex-col h-full w-full max-w-7xl mx-auto flex-1 min-h-0 pb-4 bg-white/95 backdrop-blur-md rounded-3xl p-3 md:p-6 border-4 border-blue-300">
                   <div className="bg-blue-100 text-blue-900 p-3 xl:p-4 rounded-xl text-center font-bold text-sm md:text-base xl:text-xl border-l-4 border-blue-500 shadow-sm flex items-center justify-center gap-3 mb-4 flex-shrink-0">
                     <Icons.BarChart className="w-5 h-5 xl:w-7 xl:h-7 text-blue-600" /> Lakukan survei makanan favorit dan laporkan datanya!
                   </div>

                   <div className="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden flex flex-col md:flex-row flex-1 min-h-0">
                        {/* Panel Kiri: Cerita */}
                        <div className="md:w-5/12 bg-blue-50 p-4 md:p-6 border-b md:border-b-0 md:border-r border-blue-200 flex flex-col min-h-0 overflow-y-auto custom-scrollbar">
                            <h3 className="font-black text-blue-900 mb-3 flex items-center gap-3 text-base md:text-lg xl:text-2xl flex-shrink-0">
                                {data.stimulusTitle}
                            </h3>
                            <div className="text-gray-800 text-sm md:text-base whitespace-pre-wrap leading-relaxed font-medium bg-white p-4 rounded-xl border border-blue-100 shadow-sm mb-6 flex-1">
                                {data.stimulusText}
                            </div>

                            <div className="bg-yellow-100 p-5 rounded-2xl border-2 border-yellow-300 mt-auto shadow-sm flex-shrink-0">
                                <h4 className="font-black text-yellow-900 mb-2 text-sm md:text-base">{data.tasks.t4.title}</h4>
                                <p className="text-xs md:text-sm text-yellow-800 font-bold leading-relaxed">{data.tasks.t4.desc}</p>
                            </div>
                        </div>

                        {/* Panel Kanan: Form */}
                        <div className="md:w-7/12 p-4 md:p-6 flex flex-col min-h-0">
                            <div className="space-y-4 xl:space-y-6 flex-grow overflow-y-auto custom-scrollbar pr-2">
                                {/* Langkah 1: Input Data */}
                                <div>
                                    <div className="border-b-2 border-gray-100 pb-2 mb-3">
                                        <h4 className="font-black text-gray-800 text-base md:text-lg">{data.tasks.t1.title}</h4>
                                        <p className="text-xs md:text-sm font-bold text-gray-500 mt-1">{data.tasks.t1.desc}</p>
                                    </div>
                                    <div className="grid grid-cols-2 gap-3">
                                        <div className="flex items-center gap-2 bg-gray-50 p-2 rounded-xl border-2 border-gray-200">
                                            <span className="font-bold text-gray-700 w-1/2 text-sm md:text-base">Bakso</span>
                                            <input type="number" placeholder="0" className="w-1/2 p-2 rounded-lg border-2 border-gray-300 outline-none focus:border-blue-400 text-center font-bold text-sm md:text-base" value={counts.bakso} onChange={(e) => handleCount('bakso', e.target.value)} />
                                        </div>
                                        <div className="flex items-center gap-2 bg-gray-50 p-2 rounded-xl border-2 border-gray-200">
                                            <span className="font-bold text-gray-700 w-1/2 text-sm md:text-base">Soto</span>
                                            <input type="number" placeholder="0" className="w-1/2 p-2 rounded-lg border-2 border-gray-300 outline-none focus:border-blue-400 text-center font-bold text-sm md:text-base" value={counts.soto} onChange={(e) => handleCount('soto', e.target.value)} />
                                        </div>
                                        <div className="flex items-center gap-2 bg-gray-50 p-2 rounded-xl border-2 border-gray-200">
                                            <span className="font-bold text-gray-700 w-1/2 text-sm md:text-base">Mie Goreng</span>
                                            <input type="number" placeholder="0" className="w-1/2 p-2 rounded-lg border-2 border-gray-300 outline-none focus:border-blue-400 text-center font-bold text-sm md:text-base" value={counts.mie} onChange={(e) => handleCount('mie', e.target.value)} />
                                        </div>
                                        <div className="flex items-center gap-2 bg-gray-50 p-2 rounded-xl border-2 border-gray-200">
                                            <span className="font-bold text-gray-700 w-1/2 text-sm md:text-base">Nasi Kuning</span>
                                            <input type="number" placeholder="0" className="w-1/2 p-2 rounded-lg border-2 border-gray-300 outline-none focus:border-blue-400 text-center font-bold text-sm md:text-base" value={counts.kuning} onChange={(e) => handleCount('kuning', e.target.value)} />
                                        </div>
                                        <div className="flex items-center gap-2 bg-gray-50 p-2 rounded-xl border-2 border-gray-200 col-span-2">
                                            <span className="font-bold text-gray-700 w-1/2 text-sm md:text-base">Nasi Pecel</span>
                                            <input type="number" placeholder="0" className="w-1/2 p-2 rounded-lg border-2 border-gray-300 outline-none focus:border-blue-400 text-center font-bold text-sm md:text-base" value={counts.pecel} onChange={(e) => handleCount('pecel', e.target.value)} />
                                        </div>
                                    </div>
                                    <div className="mt-3 text-right bg-blue-50 py-2 px-4 rounded-lg inline-block float-right border border-blue-200">
                                        <span className={`font-black text-sm md:text-base ${currentTotal === 20 ? 'text-green-600' : 'text-red-500'}`}>Total Responden: {currentTotal} / 20</span>
                                    </div>
                                    <div className="clear-both"></div>
                                </div>

                                {/* Langkah 2: Analisis Data */}
                                <div className="mt-6 pt-4 border-t-2 border-blue-100">
                                    <div className="border-b-2 border-gray-100 pb-2 mb-3">
                                        <h4 className="font-black text-gray-800 text-base md:text-lg">{data.tasks.t2.title}</h4>
                                        <p className="text-xs md:text-sm font-bold text-gray-500 mt-1">{data.tasks.t2.desc}</p>
                                    </div>
                                    <div className="space-y-3">
                                        <div className="bg-gray-50 p-3 rounded-xl border border-gray-200">
                                            <label className="block text-sm md:text-base font-bold text-gray-700 mb-2">{data.tasks.t2.q1}</label>
                                            <select value={analysis.q1} onChange={(e) => setAnalysis({...analysis, q1: e.target.value})} className="w-full p-2 rounded-lg border-2 border-gray-300 outline-none focus:border-blue-400 font-medium text-sm md:text-base bg-white cursor-pointer shadow-sm">
                                                <option value="" disabled>-- Pilih Makanan --</option>
                                                <option value="Bakso">Bakso</option>
                                                <option value="Soto">Soto</option>
                                                <option value="Mie Goreng">Mie Goreng</option>
                                                <option value="Nasi Kuning">Nasi Kuning</option>
                                                <option value="Nasi Pecel">Nasi Pecel</option>
                                            </select>
                                        </div>
                                        <div className="bg-gray-50 p-3 rounded-xl border border-gray-200">
                                            <label className="block text-sm md:text-base font-bold text-gray-700 mb-2">{data.tasks.t2.q2}</label>
                                            <select value={analysis.q2} onChange={(e) => setAnalysis({...analysis, q2: e.target.value})} className="w-full p-2 rounded-lg border-2 border-gray-300 outline-none focus:border-blue-400 font-medium text-sm md:text-base bg-white cursor-pointer shadow-sm">
                                                <option value="" disabled>-- Pilih Makanan --</option>
                                                <option value="Bakso">Bakso</option>
                                                <option value="Soto">Soto</option>
                                                <option value="Mie Goreng">Mie Goreng</option>
                                                <option value="Nasi Kuning">Nasi Kuning</option>
                                                <option value="Nasi Pecel">Nasi Pecel</option>
                                            </select>
                                        </div>
                                        <div className="bg-gray-50 p-3 rounded-xl border border-gray-200">
                                            <label className="block text-sm md:text-base font-bold text-gray-700 mb-2">{data.tasks.t2.q3}</label>
                                            <input type="number" value={analysis.q3} onChange={(e) => setAnalysis({...analysis, q3: e.target.value})} placeholder="Masukkan angka selisihnya..." className="w-full p-2 rounded-lg border-2 border-gray-300 outline-none focus:border-blue-400 font-medium text-sm md:text-base bg-white shadow-sm" />
                                        </div>
                                    </div>
                                </div>

                                {/* Langkah 3: Penyajian */}
                                <div className="mt-6 pt-4 border-t-2 border-blue-100">
                                    <div className="border-b-2 border-gray-100 pb-2 mb-3">
                                        <h4 className="font-black text-gray-800 text-base md:text-lg">{data.tasks.t3.title}</h4>
                                        <p className="text-xs md:text-sm font-bold text-gray-500 mt-1">{data.tasks.t3.desc}</p>
                                    </div>
                                    <div className="grid grid-cols-2 sm:grid-cols-4 gap-2 mb-3">
                                        {data.tasks.t3.options.map(opt => (
                                            <button key={opt} onClick={() => setFormat(opt)} className={`py-2 px-1 rounded-lg border-2 font-bold text-xs md:text-sm transition-all ${format === opt ? 'border-blue-500 bg-blue-50 text-blue-800 shadow-sm ring-2 ring-blue-300' : 'border-gray-200 bg-gray-50 text-gray-600 hover:border-blue-300'}`}>
                                                {opt}
                                            </button>
                                        ))}
                                    </div>
                                    <div className="bg-sky-50 border border-sky-200 p-3 rounded-xl mb-3">
                                        <p className="text-xs font-bold text-sky-800">{data.tasks.t3.requirements}</p>
                                    </div>
                                    <textarea rows="3" placeholder={data.tasks.t3.planLabel} className="w-full p-3 rounded-xl border-2 border-gray-300 bg-gray-50 outline-none focus:border-blue-400 focus:bg-white transition-all text-sm font-medium" value={plan} onChange={(e) => setPlan(e.target.value)} />
                                </div>
                            </div>

                            <div className="pt-4 flex justify-end flex-shrink-0 border-t border-gray-100 mt-2">
                                <button onClick={handleSubmitProject} className="bg-blue-600 hover:bg-blue-700 text-white font-black py-3 px-8 rounded-2xl text-base md:text-lg shadow-[0_4px_0_#1e40af] active:shadow-none active:translate-y-1 transition-all flex items-center justify-center gap-2 w-full md:w-auto">
                                    <Icons.Save className="w-5 h-5" /> Periksa & Simpan Laporan
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // --- END SCREEN ---
        function EndScreen({ userData, correctCount, onRestart, playerName, playerSchool }) {
            const [isSaving, setIsSaving] = useState(false);
            const [saveStatus, setSaveStatus] = useState("idle"); 

            const handleSaveToGoogleSheets = async () => {
                if(!GOOGLE_SCRIPT_URL || GOOGLE_SCRIPT_URL.includes("MASUKKAN_URL")) return alert("URL Google Script belum dipasang.");
                setIsSaving(true);
                
                const payload = {
                    nama: playerName, sekolah: playerSchool, skor: correctCount, benar: correctCount,
                    ref1: "-", ref2: "-", ref3: "-", ref4: "-",
                    papua_masalah: userData.final_project?.['Data Survei'] || "-",
                    papua_solusi: userData.final_project ? `${userData.final_project['Penyajian']} - ${userData.final_project['Alasan']}` : "-",
                    papua_kampanye: "-",
                };
                
                try {
                    await fetch(GOOGLE_SCRIPT_URL, { method: "POST", mode: "no-cors", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
                    setSaveStatus("success");
                } catch (error) { setSaveStatus("error"); } finally { setIsSaving(false); }
            };

            return (
                <div className="flex flex-col items-center justify-center gap-6 xl:gap-10 animate-fade-in w-full flex-1">
                  <div className="text-center bg-white/95 backdrop-blur-sm p-6 md:p-10 rounded-3xl shadow-lg w-full max-w-2xl border-4 border-amber-300">
                    <div className="w-24 h-24 md:w-32 md:h-32 bg-amber-400 rounded-full flex items-center justify-center mx-auto text-5xl md:text-7xl shadow-inner border-4 border-white animate-bounce-slow">
                        🏅
                    </div>
                    <h2 className="text-3xl md:text-5xl font-black text-amber-900 mt-4">MISI SELESAI!</h2>
                    <p className="text-base md:text-xl font-bold mt-2">{playerName}, <span className="text-blue-700">Detektif Data Terhebat</span></p>
                    <div className="text-lg md:text-2xl font-black text-gray-600 mt-6">
                        Poin Analisis Data <br/><span className="text-5xl md:text-7xl text-amber-500 text-outline inline-block mt-2">{correctCount} / 21</span>
                    </div>
                  </div>

                  <div className="w-full max-w-2xl bg-white/95 backdrop-blur-sm p-6 md:p-8 rounded-3xl shadow-xl border-4 border-blue-300 relative text-base">
                    <div className="text-center border-b-2 border-gray-100 pb-4 mb-4">
                      <h3 className="font-black text-xl md:text-2xl text-blue-900">BERKAS DETEKTIF</h3>
                      <p className="text-gray-600 font-bold text-sm md:text-base mt-1">{playerSchool}</p>
                    </div>
                    <div className="space-y-3 max-h-48 overflow-y-auto pr-3 custom-scrollbar text-sm md:text-base">
                      <p className="bg-sky-50 p-4 rounded-xl border border-sky-100"><b className="text-sky-900 block mb-1">Hasil Survei Makanan:</b> "{userData.final_project ? userData.final_project['Data Survei'] : '-'}"</p>
                      <p className="bg-yellow-50 p-4 rounded-xl border border-yellow-100"><b className="text-yellow-900 block mb-1">Penyajian Data & Alasan:</b> "{userData.final_project ? `${userData.final_project['Penyajian']} - ${userData.final_project['Alasan']}` : '-'}"</p>
                      <p className="bg-green-50 p-4 rounded-xl border border-green-100"><b className="text-green-900 block mb-1">Pemikiran Detektif:</b> "{userData.ref5 || '-'}"</p>
                    </div>
                  </div>

                  <div className="w-full max-w-2xl space-y-4 mt-2">
                    {saveStatus === 'idle' && <button onClick={handleSaveToGoogleSheets} disabled={isSaving} className="bg-blue-600 hover:bg-blue-700 text-white font-black w-full py-4 rounded-2xl flex items-center justify-center gap-3 text-lg shadow-[0_4px_0_#1e40af] active:shadow-none active:translate-y-1 transition-all">{isSaving ? "Menyimpan Laporan..." : <><Icons.Save className="w-6 h-6"/> Serahkan ke Markas Guru</>}</button>}
                    {saveStatus === 'success' && <div className="bg-green-100 text-green-800 p-4 rounded-2xl text-center font-bold text-lg border-2 border-green-300">Laporan Diterima! ✅</div>}
                    {saveStatus === 'error' && <div className="bg-red-100 text-red-800 p-4 rounded-2xl text-center font-bold text-lg border-2 border-red-300">Koneksi Gagal. <button onClick={()=>setSaveStatus('idle')} className="underline text-red-600 ml-2">Coba lagi</button></div>}
                    <button onClick={onRestart} className="bg-green-500 hover:bg-green-600 text-white font-black w-full py-4 rounded-2xl flex items-center justify-center gap-3 text-lg shadow-[0_4px_0_#166534] active:shadow-none active:translate-y-1 transition-all"><Icons.RefreshCcw className="w-6 h-6"/> Analisis Kasus Baru</button>
                  </div>
                </div>
            );
        }

        function ReflectionSection({ question, value, onChange, onNext }) {
            return (
                <div className="bg-white/95 p-8 md:p-12 xl:p-16 rounded-3xl shadow-xl text-center space-y-6 border border-blue-200 w-full max-w-4xl mx-auto animate-fade-in my-auto border-4 border-amber-300">
                  <div className="w-20 h-20 xl:w-28 xl:h-28 bg-blue-100 rounded-full flex items-center justify-center mx-auto text-4xl xl:text-6xl shadow-inner border-4 border-white">🤔</div>
                  <div>
                    <h3 className="text-2xl md:text-3xl xl:text-4xl font-black text-blue-900 mb-3 uppercase tracking-wider">Pemikiran Detektif</h3>
                    <p className="text-lg md:text-xl font-bold text-gray-700 leading-relaxed whitespace-pre-wrap">{question}</p>
                  </div>
                  <textarea value={value} onChange={(e) => onChange(e.target.value)} className="w-full p-5 border-2 rounded-2xl text-lg bg-blue-50 outline-none focus:border-blue-500 h-40 text-gray-800 font-medium transition-colors" placeholder="Tuliskan pendapatmu di sini..." />
                  <button onClick={onNext} disabled={value.length < 5} className="bg-green-600 hover:bg-green-700 text-white font-black w-full py-4 text-xl rounded-2xl disabled:opacity-50 shadow-[0_5px_0_#166534] active:shadow-none active:translate-y-1 transition-all disabled:shadow-none disabled:translate-y-0 disabled:cursor-not-allowed">Akhiri Investigasi 🚀</button>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PetualanganBhinneka />);
    </script>
</body>
</html>
